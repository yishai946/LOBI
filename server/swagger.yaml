components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BuildingIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApartmentIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResidentId:
      name: residentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ManagerId:
      name: managerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IssueId:
      name: issueId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    RequestOtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^05\\d{8}$'

    VerifyOtpRequest:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
          pattern: '^05\\d{8}$'
        otp:
          type: string
          minLength: 6
          maxLength: 6

    VerifyOtpResponse:
      type: object
      required: [accessToken, contexts, needsProfileCompletion]
      properties:
        accessToken:
          type: string
        contexts:
          type: array
          items:
            $ref: "#/components/schemas/AuthContext"
        needsProfileCompletion:
          type: boolean

    AuthContext:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [ADMIN, MANAGER, RESIDENT]
        buildingId:
          type: string
          format: uuid
        apartmentId:
          type: string
          format: uuid
        buildingName:
          type: string
          nullable: true

    CompleteProfileRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    SelectContextRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [ADMIN, MANAGER, RESIDENT]
        buildingId:
          type: string
          format: uuid
        apartmentId:
          type: string
          format: uuid

    CreateResidentUserRequest:
      type: object
      required: [phone, apartmentId]
      properties:
        phone:
          type: string
          pattern: '^05\\d{8}$'
        apartmentId:
          type: string
          format: uuid

    CreateManagerUserRequest:
      type: object
      required: [phone, buildingId]
      properties:
        phone:
          type: string
          pattern: '^05\\d{8}$'
        apartmentId:
          type: string
          format: uuid
          nullable: true
        buildingId:
          type: string
          format: uuid

    UpdateMeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1

    CreateBuildingRequest:
      type: object
      required: [address]
      properties:
        name:
          type: string
          nullable: true
        address:
          type: string
          minLength: 5
        logoUrl:
          type: string
          format: uri

    UpdateBuildingRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        address:
          type: string
          minLength: 5
        logoUrl:
          type: string
          format: uri

    CreateApartmentRequest:
      type: object
      required: [name, buildingId]
      properties:
        name:
          type: string
          minLength: 1
        buildingId:
          type: string
          format: uuid

    UpdateApartmentRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1

    CreateResidentRequest:
      type: object
      required: [userId, apartmentId]
      properties:
        userId:
          type: string
          format: uuid
        apartmentId:
          type: string
          format: uuid

    UpdateResidentRequest:
      type: object
      properties:
        apartmentId:
          type: string
          format: uuid

    CreateManagerRequest:
      type: object
      required: [userId, buildingId]
      properties:
        userId:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid

    CreateMessageRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        isUrgent:
          type: boolean

    GenerateUploadUrlsRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          maxItems: 3
          items:
            type: object
            required: [filename, contentType]
            properties:
              filename:
                type: string
                minLength: 1
              contentType:
                type: string
                minLength: 1

    CreateIssueRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        apartmentId:
          type: string
          format: uuid
        imageKeys:
          type: array
          maxItems: 3
          items:
            type: string

    UpdateIssueRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true

    CreatePaymentRequest:
      type: object
      required: [title, amount, buildingId, isRecurring]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        amount:
          type: number
          exclusiveMinimum: false
        buildingId:
          type: string
          format: uuid
        isRecurring:
          type: boolean

    UpdatePaymentRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        amount:
          type: number
          exclusiveMinimum: false
        isRecurring:
          type: boolean

    CheckoutPaymentRequest:
      type: object
      properties:
        isRecurring:
          type: boolean

    Building:
      type: object
      required: [id, address, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: true
        address:
          type: string
        logoUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time

    Apartment:
      type: object
      required: [id, name, buildingId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        buildingId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    User:
      type: object
      required: [id, phone, role, isActive, createdAt]
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [ADMIN, USER]
        isActive:
          type: boolean
        otpCode:
          type: string
          nullable: true
        otpExpires:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Resident:
      type: object
      required: [userId, apartmentId]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        userId:
          type: string
          format: uuid
        apartmentId:
          type: string
          format: uuid

    ResidentWithRelations:
      allOf:
        - $ref: "#/components/schemas/Resident"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            apartment:
              $ref: "#/components/schemas/Apartment"

    Manager:
      type: object
      required: [id, userId, buildingId]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid

    ManagerWithRelations:
      allOf:
        - $ref: "#/components/schemas/Manager"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            building:
              $ref: "#/components/schemas/Building"

    Message:
      type: object
      required: [id, buildingId, title, content, isUrgent, createdAt]
      properties:
        id:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        isUrgent:
          type: boolean
        createdAt:
          type: string
          format: date-time

    IssueImage:
      type: object
      required: [id, issueId, imageKey, createdAt]
      properties:
        id:
          type: string
          format: uuid
        issueId:
          type: string
          format: uuid
        imageKey:
          type: string
        createdAt:
          type: string
          format: date-time

    Issue:
      type: object
      required: [id, title, createdById, buildingId, apartmentId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        createdById:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid
        apartmentId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    IssueWithImages:
      allOf:
        - $ref: "#/components/schemas/Issue"
        - type: object
          properties:
            images:
              type: array
              items:
                $ref: "#/components/schemas/IssueImage"

    Payment:
      type: object
      required:
        [
          id,
          title,
          amount,
          currency,
          buildingId,
          isRecurring,
          status,
          createdAt,
        ]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        amount:
          type: string
          description: Decimal serialized as string
        currency:
          type: string
          example: ILS
        buildingId:
          type: string
          format: uuid
        stripeSessionId:
          type: string
          nullable: true
        isRecurring:
          type: boolean
        status:
          type: string
          enum: [PENDING, PAID]
        createdAt:
          type: string
          format: date-time

    PaymentAssignment:
      type: object
      required: [id, paymentId, apartmentId, status, createdAt]
      properties:
        id:
