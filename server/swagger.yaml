openapi: 3.0.3
info:
  title: LOBI Server API
  version: 1.0.0
  description: |
    Detailed API documentation generated from the current Express routes and validators.

    Authentication model:
    - Most routes require Bearer JWT via Authorization header.
    - Refresh endpoint uses a refreshToken cookie.

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
  - name: Users
  - name: Buildings
  - name: Apartments
  - name: Residents
  - name: Managers
  - name: Messages
  - name: Issues
  - name: Payments

paths:
  /api/auth/request-otp:
    post:
      tags: [Auth]
      summary: Request OTP
      description: Sends a one-time password to a registered and active user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpRequest"
            examples:
              valid:
                value:
                  phone: "0501234567"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                success:
                  value:
                    message: OTP sent
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP
      description: Verifies OTP, sets refresh token cookie, and returns access token payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: OTP verified
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOtpResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Issues a new access token using refreshToken cookie.
      security:
        - refreshCookieAuth: []
      responses:
        "200":
          description: Access token refreshed
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [accessToken]
                properties:
                  accessToken:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/complete-profile:
    post:
      tags: [Auth]
      summary: Complete profile
      description: Sets the user display name.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteProfileRequest"
      responses:
        "200":
          description: Profile completed
          content:
            application/json:
              schema:
                type: object
                required: [message, user]
                properties:
                  message:
                    type: string
                  user:
                    type: object
                    required: [id]
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                        nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

